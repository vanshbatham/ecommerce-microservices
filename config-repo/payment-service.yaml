server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_payment
    username: root
    password: Vansh@sql16
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        # tell Spring to ignore the Producer's package headers
        spring.json.use.type.headers: false
        # tell Spring exactly which local class to map the JSON into
        spring.json.value.default.type: com.ecommerce.payment_service.event.OrderPlacedEvent